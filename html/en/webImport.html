<!DOCTYPE html>
<html lang="en">
<head>
    <title>Import from Web</title>
    <link id="theme" rel="stylesheet" type="text/css" href="../../css/light.css">
    <link rel="stylesheet" type="text/css" href="../../css/fonts.css">
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        .dialogBody { display: flex; flex-direction: column; height: 100vh; }
        .paddedArea { flex: 1; overflow-y: auto; padding: 8px 12px; }
        .topActions { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
        .urlHint { font-size: 11px; color: #666; margin-top: 2px; }
        .progressArea { margin-top: 8px; font-size: 12px; color: #333; }
        .errorArea { margin-top: 8px; font-size: 12px; color: #c00; }
        .previewHeader { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .previewTitle { font-weight: bold; font-size: 13px; }
        .selectControls { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .selectAllLabel { display: flex; align-items: center; gap: 4px; cursor: pointer; }
        #selectInfo { color: #555; }
        .previewTableWrap { max-height: 300px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; }
        .checkCell { width: 24px; text-align: center; padding: 2px 4px; }
        .rowCheckbox { cursor: pointer; }
        .srcCell, .tgtCell { padding: 2px 6px; line-height: 1.6; vertical-align: top; }
        .srcCell { max-width: 260px; word-break: break-word; }
        .tgtCell { max-width: 340px; word-break: break-word; }
        .pageBtn { margin: 0 3px; padding: 2px 10px; font-size: 12px; cursor: pointer; }
        .pageInfo { font-size: 12px; color: #555; }
    </style>
</head>
<body class="dialogBody">
    <div class="paddedArea">
        <table class="fill_width">
            <tr>
                <td class="middle noWrap"><label for="projectInput">Exercise Name</label></td>
                <td class="fill_width middle">
                    <input id="projectInput" class="table_input middle" autofocus>
                </td>
            </tr>
            <tr>
                <td class="middle noWrap"><label for="urlInput">URL Pattern</label></td>
                <td class="fill_width middle">
                    <input id="urlInput" class="fill_width middle" placeholder="https://www.reciyi.com/2024/08/9148-{n}.html">
                    <div class="urlHint">Paste a URL with a page range — the page number will be auto-detected. Or use {n} as placeholder. Single page? Leave range at 1-1.</div>
                </td>
            </tr>
            <tr>
                <td class="middle noWrap"><label>Page Range</label></td>
                <td class="middle">
                    <input id="startPage" type="number" min="1" value="1" style="width:60px;">
                    &nbsp;&ndash;&nbsp;
                    <input id="endPage" type="number" min="1" value="14" style="width:60px;">
                </td>
            </tr>
            <tr>
                <td class="middle noWrap"><label for="srcLangSelect">Source Language</label></td>
                <td>
                    <select id="srcLangSelect" class="table_select">
                        <option value="zh-CN" selected>Chinese (Simplified)</option>
                        <option value="en">English</option>
                        <option value="zh-TW">Chinese (Traditional)</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="es">Spanish</option>
                        <option value="pt-BR">Portuguese (Brazil)</option>
                        <option value="ru">Russian</option>
                        <option value="ar">Arabic</option>
                        <option value="it">Italian</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td class="middle noWrap"><label for="tgtLangSelect">Target Language</label></td>
                <td>
                    <select id="tgtLangSelect" class="table_select">
                        <option value="en" selected>English</option>
                        <option value="zh-CN">Chinese (Simplified)</option>
                        <option value="zh-TW">Chinese (Traditional)</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="es">Spanish</option>
                        <option value="pt-BR">Portuguese (Brazil)</option>
                        <option value="ru">Russian</option>
                        <option value="ar">Arabic</option>
                        <option value="it">Italian</option>
                    </select>
                </td>
            </tr>
        </table>
        <div class="topActions">
            <button id="previewBtn">Preview</button>
            <button id="importBtn">Import Exercise</button>
        </div>
        <div id="progressArea" class="progressArea" style="display:none;"></div>
        <div id="errorArea" class="errorArea" style="display:none;"></div>
        <div id="previewArea" style="display:none; margin-top:10px;">
            <div class="previewHeader">
                <span class="previewTitle">Segments:</span>
                <div class="selectControls">
                    <label class="selectAllLabel"><input type="checkbox" id="selectAllCheckbox"> Select all on page</label>
                    <span id="selectInfo"></span>
                </div>
            </div>
            <div class="previewTableWrap">
                <table id="previewTable" class="fill_width stripes" style="font-size:12px; table-layout:fixed;">
                    <colgroup>
                        <col style="width:28px;">
                        <col style="width:40%;">
                        <col>
                    </colgroup>
                    <thead>
                        <tr>
                            <th></th>
                            <th>Source</th>
                            <th>Target</th>
                        </tr>
                    </thead>
                    <tbody id="previewBody"></tbody>
                </table>
            </div>
            <div id="paginationDiv" style="margin-top:4px;"></div>
        </div>
    </div>
    <script>
        const { WebImport } = require('../../js/webImport.js');
        new WebImport();
    </script>
</body>
</html>
